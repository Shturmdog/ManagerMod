<!-- templates/create_menu.html -->
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Создание блюда</title>
</head>
<body>
<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h1>Добавить новое блюдо</h1>
    <form method="POST">
        <label for="name">Название блюда:</label>
        <input type="text" name="name" id="name" required>

        <label for="price">Цена (руб):</label>
        <input type="number" step="0.01" name="price" id="price" required>

        <label for="category">Категория:</label>
        <select name="category" id="category">
            <option value="soup">Суп</option>
            <option value="salad">Салат</option>
            <option value="main">Горячее</option>
            <option value="dessert">Десерт</option>
            <option value="drink">Напиток</option>
        </select>

        <button type="submit">Сохранить блюдо</button>
    </form>
    <div class="nav-links">
        <a href="{{ url_for('cook_dashboard') }}">Вернуться в панель повара</a>
    </div>
</div>
</body>
</html>
